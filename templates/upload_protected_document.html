{% extends "base.html" %}

{% block title %}Добавить конфиденциальный документ{% endblock %}

{% block content %}

<div class="d-flex align-items-center gap-3 mb-4">
    <a href="/protected" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">Добавить конфиденциальный документ</h4>
</div>

<div class="card p-4" style="max-width:600px">
    <p class="text-muted small mb-3">
        Эти документы используются как обучающая выборка для байесовского классификатора.
    </p>
    <form action="/protected/upload" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label fw-medium">Файл (.txt, .docx, .pdf)</label>
            <input class="form-control" type="file" name="file" accept=".txt,.docx,.pdf" required>
        </div>
        <button class="btn btn-primary" type="submit">
            <i class="bi bi-upload me-1"></i>Загрузить
        </button>
    </form>
</div>

{% endblock %}
