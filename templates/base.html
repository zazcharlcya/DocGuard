<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DocGuard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fc; margin: 0; }

        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: #1e1b4b;
            color: #c7d2fe;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 22px 20px 16px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            border-bottom: 1px solid #312e81;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo i { font-size: 1.4rem; color: #818cf8; }

        .sidebar-section {
            padding: 18px 16px 6px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #6366f1;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: #c7d2fe;
            text-decoration: none;
            font-size: 0.92rem;
            border-left: 3px solid transparent;
            transition: all .15s;
        }

        .sidebar a:hover {
            background: rgba(99,102,241,.18);
            color: #fff;
            border-left-color: #818cf8;
        }

        .sidebar a i { width: 18px; text-align: center; }

        .main-area {
            margin-left: 240px;
            padding: 32px 40px;
            min-height: 100vh;
        }

        .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }

        .btn-primary { background: #4f46e5; border-color: #4f46e5; }
        .btn-primary:hover { background: #3730a3; border-color: #3730a3; }

        .badge-confidential { background: #ef4444 !important; }
        .badge-regular      { background: #22c55e !important; }

        .stat-card {
            border-radius: 14px;
            padding: 22px 26px;
            color: #fff;
        }
        .stat-card .stat-num   { font-size: 2.4rem; font-weight: 700; line-height: 1; }
        .stat-card .stat-label { font-size: 0.85rem; opacity: .85; margin-top: 4px; }
        .stat-total { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .stat-conf  { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .stat-reg   { background: linear-gradient(135deg, #22c55e, #15803d); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <i class="bi bi-shield-lock-fill"></i>
        DocGuard
    </div>

    <div class="sidebar-section">Анализ</div>
    <a href="/"><i class="bi bi-house-door"></i> Главная</a>
    <a href="/history"><i class="bi bi-clock-history"></i> История проверок</a>

    <div class="sidebar-section">Обучающие данные</div>
    <a href="/protected"><i class="bi bi-file-earmark-lock2"></i> Конфиденциальные</a>
    <a href="/regular"><i class="bi bi-file-earmark-text"></i> Обычные документы</a>
</aside>

<main class="main-area">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
